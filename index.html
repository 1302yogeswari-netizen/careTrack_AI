<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - CareTrackAI</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .landing-wrapper{
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="logo" style="margin: 0 auto;"> CareTrackAI: Clinical Management System</div>
    </header>

    <main class="container landing-wrapper">
        <section class="form-container" style="max-width: 450px; width: 100%; text-align: center; box-shadow: var(--shadow-md);">
            <h2 style="margin-bottom: 0.5rem; color: var(--primary-color);">Staff Authentication</h2>
            <p style="color: var(--text-muted); margin-bottom: 2rem; font-size: 0.95rem;">
                Enter your crendentials to access the resident care matrix.
            </p>
            
            <form action="dashboard.html" method="GET">
                <div class="form-group" style="text-align: left;">
                    <label for="staffEmail">Facility Email Address</label>
                    <input type="email" id="staffEmail" required placeholder="name@facility.com" value="nurse.admin@caretrack.org">
                </div>

                <div class="form-group" style="text-align: left; margin-bottom: 1.5rem;">
                    <label for="staffPass">Security Keyphrase</label>
                    <input type="passwrod" id="staffPass" required placeholder="........" value="password123">
                </div>

                <button type="submit" class="btn" style="width: 100%; font-size: 1.05rem; padding: 0.8rem;">
                    Authorize & Enter Terminal
                </button>
            </form>

            <div style="margin-top: 1.5rem; font-size: 0.85rem; color:var(--text-muted);">
                Terminal Connection: Secure Local Environment
            </div>
        </section>
    </main>
    
</body>
</html>
